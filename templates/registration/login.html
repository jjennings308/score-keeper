{% extends "base.html" %}
{% block title %}Sign In — ScoreKeeper{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <div class="text-center mb-8">
        <p class="text-4xl mb-3">🎯</p>
        <h1 class="text-2xl font-bold text-gray-800">Sign in to ScoreKeeper</h1>
    </div>

    <div class="bg-white shadow-sm rounded-xl border border-gray-200 p-6">
        <form method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                Username or password was incorrect.
            </div>
            {% endif %}

            <div class="mb-5">
                <label for="id_username" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                    Username
                </label>
                <input type="text" name="username" id="id_username"
                       autofocus required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="mb-6">
                <label for="id_password" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                    Password
                </label>
                <input type="password" name="password" id="id_password"
                       required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-6 py-2.5 rounded-lg transition-colors duration-150">
                Sign in
            </button>

            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>
{% endblock %}
