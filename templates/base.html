<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScoreKeeper{% endblock %}</title>

    <!-- Tailwind CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- HTMX CSRF token support for Django -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.body.addEventListener('htmx:configRequest', function (evt) {
                evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
            });
        });
    </script>

    {% block extra_head %}{% endblock %}
</head>
<body class="h-full" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% include "partials/navbar.html" %}

    <!-- Flash Messages -->
    {% if messages %}
    <div id="messages" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4 space-y-2">
        {% for message in messages %}
        <div class="flex items-center justify-between px-4 py-3 rounded-lg shadow-sm
            {% if message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
            {% elif message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
            {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 border border-yellow-200
            {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
            <span>{{ message }}</span>
            <button onclick="this.parentElement.remove()"
                    class="ml-4 text-current opacity-50 hover:opacity-100 text-lg leading-none">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Page Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-gray-400 text-sm">ScoreKeeper &mdash; Keep track of what matters</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
