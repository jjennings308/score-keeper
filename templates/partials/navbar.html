                            type="button"

                            aria-expanded="false"
                            aria-haspopup="true">
                        Manage
                        <svg class="w-4 h-4 transition-transform duration-150" id="manage-chevron"
                             fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                        </svg>
                    </button>

                    <div id="manage-dropdown"
                         class="hidden absolute right-0 mt-1 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50">

                        </a>
                        {% endif %}

                    </div>
                </div>

                <a href="{% url 'scoring:create' %}"

                <form method="post" action="{% url 'account_logout' %}">

            </div>

            <!-- Mobile Hamburger Button -->
            <div class="md:hidden">
                <button id="mobile-menu-btn"

                        aria-expanded="false">
                    <span class="sr-only">Open main menu</span>

    <!-- Mobile Menu -->

            <a href="{% url 'scoring:list' %}"
               class="block text-indigo-100 hover:bg-indigo-600 hover:text-white px-3 py-2 rounded-md text-base font-medium">
                Sessions
            </a>
            <a href="{% url 'stats:games' %}"
               class="block text-indigo-100 hover:bg-indigo-600 hover:text-white px-3 py-2 rounded-md text-base font-medium">
                Stats
            </a>

            <p class="px-3 pt-3 pb-1 text-xs font-semibold text-indigo-300 uppercase tracking-wider">

               class="block text-indigo-100 hover:bg-indigo-600 hover:text-white px-3 py-2 rounded-md text-base font-medium">
                All Players
            </a>
            <a href="{% url 'players:group_list' %}"

            </a>
            <a href="{% url 'games:list' %}"

                Game Library
            </a>

            <a href="/admin/"

                    + New Game
                </a>

                    {% csrf_token %}
                    <button type="submit"
                            class="block w-full text-left text-indigo-100 hover:bg-indigo-600 hover:text-white px-3 py-2 rounded-md text-base font-medium">
                        Sign out

<script>
    // Hamburger toggle
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    const iconOpen = document.getElementById('icon-open');
    const iconClose = document.getElementById('icon-close');

    btn.addEventListener('click', () => {
        const isOpen = !menu.classList.contains('hidden');
        menu.classList.toggle('hidden', isOpen);
        iconOpen.classList.toggle('hidden', !isOpen);
        iconClose.classList.toggle('hidden', isOpen);
        btn.setAttribute('aria-expanded', String(!isOpen));
    });

    // Manage dropdown toggle
    const manageBtn = document.getElementById('manage-btn');
    const manageDropdown = document.getElementById('manage-dropdown');
    const manageChevron = document.getElementById('manage-chevron');

    manageBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = !manageDropdown.classList.contains('hidden');
        manageDropdown.classList.toggle('hidden', isOpen);
        manageChevron.style.transform = isOpen ? '' : 'rotate(180deg)';
        manageBtn.setAttribute('aria-expanded', String(!isOpen));
    });

    // Close dropdown when clicking anywhere outside
    document.addEventListener('click', () => {
        manageDropdown.classList.add('hidden');
        manageChevron.style.transform = '';
        manageBtn.setAttribute('aria-expanded', 'false');
    });
</script>
