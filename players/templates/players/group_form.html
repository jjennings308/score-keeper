{% extends "base.html" %}
{% block title %}{% if group %}Edit {{ group.name }}{% else %}New Group{% endif %} — ScoreKeeper{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

    <div class="mb-6">
        <a href="{% if group %}{% url 'players:group_detail' pk=group.pk %}{% else %}{% url 'players:group_list' %}{% endif %}"
           class="text-sm text-indigo-600 hover:text-indigo-800">
            ← Back
        </a>
        <h1 class="text-2xl font-bold text-gray-800 mt-2">
            {% if group %}Edit group{% else %}New group{% endif %}
        </h1>
    </div>

    <div class="bg-white shadow-sm rounded-xl border border-gray-200 p-6">
        <form method="post">
            {% csrf_token %}

            <div class="mb-5">
                <label for="name" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                    Group Name
                </label>
                <input type="text" name="name" id="name"
                       value="{{ group.name|default:'' }}"
                       placeholder="e.g. Immediate family"
                       required autofocus
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="mb-6">
                <label for="description" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                    Description <span class="normal-case font-normal text-gray-400">(optional)</span>
                </label>
                <textarea name="description" id="description" rows="2"
                          placeholder="e.g. Holiday game nights"
                          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ group.description|default:'' }}</textarea>
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <a href="{% if group %}{% url 'players:group_detail' pk=group.pk %}{% else %}{% url 'players:group_list' %}{% endif %}"
                   class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors duration-150">
                    {% if group %}Save changes{% else %}Create group{% endif %}
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
